# ⏰ 스케줄 에이전트: GitHub Actions를 이용한 매일 오전 9시 자동 실행
#
# 파일 위치: .github/workflows/daily-trend-collector.yml
#
# 설명:
#   - UTC 00:00 = KST 09:00 에 자동 실행
#   - 수집 → 랭킹 → 요약 → 커밋 → Vercel 자동 배포
#   - GitHub Actions 무료 티어로 운영 가능 (월 2,000분 무료)
#
# 사전 준비:
#   - GitHub Secrets에 아래 키 등록:
#     * GEMINI_API_KEY   (무료 티어, 권장)
#     * ANTHROPIC_API_KEY (고품질 요약, 선택)
#     * OPENAI_API_KEY    (마지막 폴백, 선택)
#
# ✅ 데이터 소스 (모두 무료 + 상업 배포 허용):
#   - Hacker News (Firebase 공식 오픈 API)
#   - GDELT (전 세계 뉴스 공개 DB)
#   - Google Trends RSS (구글 공개 검색량 피드)

name: 🌐 Daily Global Trends Collector

on:
  # KST 08:50 AM (= UTC 23:50 전날) 및 KST 08:50 PM (= UTC 11:50) 하루 2회 실행
  schedule:
    - cron: "50 23 * * *"   # KST 08:50 AM
    - cron: "50 11 * * *"   # KST 08:50 PM

  # 수동 실행도 가능 (테스트용)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "테스트 모드 (데이터 커밋 생략)"
        required: false
        default: false
        type: boolean

jobs:
  collect-and-publish:
    name: 트렌드 수집 및 배포
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. 레포지토리 체크아웃
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4
        with:
          # 봇이 커밋할 수 있도록 토큰 사용
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Node.js 환경 설정
      - name: 🟢 Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            global-trend-viewer/agents/collector/package-lock.json
            global-trend-viewer/agents/summarizer/package-lock.json

      # 3. 수집 에이전트 의존성 설치
      - name: 📦 수집 에이전트 의존성 설치
        working-directory: global-trend-viewer/agents/collector
        run: npm ci || npm install

      # 4. 요약 에이전트 의존성 설치
      - name: 📦 요약 에이전트 의존성 설치
        working-directory: global-trend-viewer/agents/summarizer
        run: npm ci || npm install

      # 5. 파이프라인 실행 (오케스트레이터)
      - name: 🚀 전체 파이프라인 실행
        working-directory: global-trend-viewer/agents/orchestrator
        env:
          # GitHub Secrets에서 API 키 주입
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node orchestrate.js

      # 6. 생성된 데이터 파일 커밋 (dry_run이 아닌 경우)
      - name: 📤 데이터 자동 커밋
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 자동 업데이트: $(date '+%Y-%m-%d') 트렌드 Top 20"
          file_pattern: |
            global-trend-viewer/public/data/live_trends.json
            global-trend-viewer/agents/*/output/*.json
          commit_user_name: "Trend Bot 🤖"
          commit_user_email: "trend-bot@noreply.github.com"

      # 7. 실행 결과 요약 출력
      - name: 📊 실행 결과 요약
        if: always()
        run: |
          echo "## 🌐 트렌드 수집 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "global-trend-viewer/public/data/live_trends.json" ]; then
            echo "✅ **데이터 업데이트 성공**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| 항목 | 값 |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
            echo "| 업데이트 시각 | $(date '+%Y-%m-%d %H:%M KST') |" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **데이터 업데이트 실패** - 로그를 확인하세요" >> $GITHUB_STEP_SUMMARY
          fi
